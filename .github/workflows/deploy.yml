name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Create deployment zip
        run: |
          cd backend
          zip -r ../elder-fraud-deploy-${{ github.sha }}.zip . -x "*.pyc" -x "__pycache__/*" -x "balanced_spam.csv"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: elder-fraud-deploy
          path: elder-fraud-deploy-${{ github.sha }}.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: elder-fraud-deploy

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Copy zip to S3
        run: |
          aws s3 cp elder-fraud-deploy-${{ github.sha }}.zip s3://ayon1113-elder-fraud-app/

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name elder-fraud-protection \
            --source-bundle S3Bucket="ayon1113-elder-fraud-app",S3Key="elder-fraud-deploy-${{ github.sha }}.zip" \
            --version-label "ver-${{ github.sha }}" \
            --description "Elder Fraud Protection deployment" \
            --region us-east-2

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name elder-fraud-environment \
            --version-label "ver-${{ github.sha }}" \
            --region us-east-2